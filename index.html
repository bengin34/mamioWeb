    <script>
      (function () {
        var supportedLocales = ["en", "de", "tr"];
        var fallbackLocale = "en";

        if (window.location.pathname !== "/") return;

        var browserLocales =
          navigator.languages && navigator.languages.length
            ? navigator.languages
            : [navigator.language || navigator.userLanguage || ""];
        var detectedLocale = fallbackLocale;

        for (var i = 0; i < browserLocales.length; i += 1) {
          var locale = String(browserLocales[i]).toLowerCase().split("-")[0];
          if (supportedLocales.indexOf(locale) !== -1) {
            detectedLocale = locale;
            break;
          }
        }

        window.location.replace(
          "/" + detectedLocale + "/" + window.location.search + window.location.hash
        );
      })();
    </script>
